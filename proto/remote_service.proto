syntax = "proto3";

package remote_service;

enum TaskStatus {
    kSuccess = 0;
    kFailed  = 1;
}

message TaskConfig {
    string workspace_subdir = 1;
    string command = 2;
    string output_subdir = 3;
    bool enable_pty = 4;
    bool xsched_enabled = 5;
    string xsched_policy = 6;
    int32 xsched_utilization = 7;
    int64 xsched_timeslice_us = 8;
}

message TaskFileChunk {
    bytes data = 1;
    string relative_path = 2;
    bool file_start = 3;
    bool file_end = 4;
    int64 file_size = 5;
}

message TaskRequest {
    oneof payload {
        TaskConfig config = 1;
        TaskFileChunk file_chunk = 2;
    }
}

message TaskResult {
    TaskStatus status = 1;
    string message = 2;
    bytes output_archive = 3;
    int64 archive_size = 4;
}

message TaskLogChunk {
    bytes data = 1;
}

message UpdateUtilizationRequest {
    string workspace_subdir = 1;
    int32 utilization = 2;
}

message UpdateUtilizationResponse {
    bool success = 1;
    string message = 2;
    repeated int32 pids = 3;
}

message TaskResponse {
    oneof payload {
        TaskLogChunk log_chunk = 1;
        TaskResult result = 2;
    }
}

service TaskManage {
    rpc TaskSubmission(stream TaskRequest) returns(stream TaskResponse) {}
    rpc UpdateUtilization(UpdateUtilizationRequest) returns(UpdateUtilizationResponse) {}
}
